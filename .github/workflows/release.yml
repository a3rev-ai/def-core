name: Build Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          # Create clean build directory
          mkdir -p build/digital-employees

          # Copy only distributable files (no dev files, tests, CI config)
          cp def-core.php LICENSE README.md readme.txt changelog.txt build/digital-employees/
          cp -r assets build/digital-employees/
          cp -r includes build/digital-employees/
          cp -r languages build/digital-employees/
          cp -r templates build/digital-employees/
          cp -r vendor build/digital-employees/

          # Remove dev-only vendor packages if any
          rm -rf build/digital-employees/vendor/bin

          # Create zip from build directory
          cd build
          zip -r ../digital-employees.zip digital-employees/

          # Verify structure
          echo "=== Zip contents (first 20 entries) ==="
          unzip -l ../digital-employees.zip | head -25
          echo "=== Verifying main plugin file ==="
          unzip -p ../digital-employees.zip digital-employees/def-core.php | head -5

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            digital-employees.zip \
            --clobber

      - name: Update README download badge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          # Update badge version and download URL in README.md
          sed -i "s|Download_Plugin-v[0-9]*\.[0-9]*\.[0-9]*-blue|Download_Plugin-${VERSION}-blue|g" README.md
          sed -i "s|releases/download/v[0-9]*\.[0-9]*\.[0-9]*/digital-employees.zip|releases/download/${VERSION}/digital-employees.zip|g" README.md

          # Only commit if there are changes
          if git diff --quiet README.md; then
            echo "README already up to date"
          else
            # Create a PR for the badge update (branch protection blocks direct push)
            BRANCH="ci/update-badge-${VERSION}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add README.md
            git commit -m "Update download badge to ${VERSION} [skip ci]"
            git push origin "$BRANCH"
            gh pr create \
              --title "Update download badge to ${VERSION} [skip ci]" \
              --body "Auto-generated by release workflow." \
              --base main \
              --head "$BRANCH"
            gh pr merge "$BRANCH" --merge --delete-branch
          fi
